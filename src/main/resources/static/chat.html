<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 채팅방</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .chat-area { height: 400px; padding: 15px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
        .message-box { padding: 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .message-box.system { margin: 0 auto; background: #e9ecef; color: #6c757d; font-size: 0.85em; text-align: center; border-radius: 20px; padding: 5px 15px; }
        .message-box.other { background: #e2e3e5; align-self: flex-start; border-bottom-left-radius: 0; }
        .message-box.me { background: #cce5ff; align-self: flex-end; border-bottom-right-radius: 0; text-align: right; }
        .sender-name { font-size: 0.8em; font-weight: bold; margin-bottom: 3px; color: #495057; }
        .input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #dee2e6; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; outline: none; }
        button { padding: 10px 15px; margin-left: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        #login-page { text-align: center; padding: 50px 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <div id="login-page" class="chat-container">
        <h2>채팅방 입장</h2>
        <div class="input-area" style="border: none;">
            <input type="text" id="username" placeholder="사용할 닉네임을 입력하세요" onkeypress="if(event.keyCode===13) connect()">
            <button onclick="connect()">입장</button>
        </div>
    </div>

    <div id="chat-page" class="chat-container" style="display: none;">
        <div class="header">자유 채팅방 💬</div>
        <div id="chat-area" class="chat-area"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode===13) sendMessage()">
            <button onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script>
        let stompClient = null;
        let username = null;

        // 1. 서버와 연결
        function connect() {
            username = document.getElementById('username').value.trim();
            if (username) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('chat-page').style.display = 'flex';

                // WebSocketConfig에서 설정한 엔드포인트(/ws-chat)로 연결
                let socket = new SockJS('/ws-chat');
                stompClient = Stomp.over(socket);

                stompClient.connect({}, onConnected, onError);
            }
        }

        // 2. 연결 성공 시 실행되는 함수
        function onConnected() {
            // 서버의 토픽(/topic/public)을 구독(subscribe)함
            stompClient.subscribe('/topic/public', onMessageReceived);

            // 입장했다는 사실을 서버로 보냄
            stompClient.send("/app/chat.addUser",
                {},
                JSON.stringify({sender: username, type: 'JOIN'})
            )
        }

        function onError(error) {
            alert('웹소켓 연결에 실패했습니다. 서버가 켜져 있는지 확인해주세요.');
        }

        // 3. 메시지 전송 함수
        function sendMessage() {
            let messageInput = document.getElementById('message');
            let messageContent = messageInput.value.trim();

            if (messageContent && stompClient) {
                let chatMessage = {
                    sender: username,
                    content: messageContent,
                    type: 'CHAT'
                };
                // 컨트롤러의 @MessageMapping("/chat.sendMessage")로 쏨
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
                messageInput.value = ''; // 입력창 비우기
            }
        }

        // 4. 메시지를 받았을 때 화면에 그리는 함수
        function onMessageReceived(payload) {
            let message = JSON.parse(payload.body);
            let chatArea = document.getElementById('chat-area');
            let messageElement = document.createElement('div');

            if (message.type === 'JOIN') {
                messageElement.classList.add('message-box', 'system');
                messageElement.innerText = message.sender + '님이 입장하셨습니다.';
            } else if (message.type === 'LEAVE') {
                messageElement.classList.add('message-box', 'system');
                messageElement.innerText = message.sender + '님이 퇴장하셨습니다.';
            } else {
                // 내가 보낸 건지 남이 보낸 건지 구분해서 CSS 클래스 적용
                if (message.sender === username) {
                    messageElement.classList.add('message-box', 'me');
                    messageElement.innerHTML = `<div>${message.content}</div>`;
                } else {
                    messageElement.classList.add('message-box', 'other');
                    messageElement.innerHTML = `<div class="sender-name">${message.sender}</div><div>${message.content}</div>`;
                }
            }

            chatArea.appendChild(messageElement);
            chatArea.scrollTop = chatArea.scrollHeight; // 스크롤을 항상 맨 아래로 유지
        }
    </script>
</body>
</html>
